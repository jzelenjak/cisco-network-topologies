    configuration:
      - name: node.cfg
        content: |-
          # this is a shell script which will be sourced at boot
          hostname Server
          # configurable user account
          USERNAME=cisco
          PASSWORD=cisco

          # configurable network parameters
          IP_ADDRESS=192.168.2.10
          NETMASK=255.255.255.0
          DEFAULT_GATEWAY=192.168.2.1
          DNS_SERVER=8.8.8.8

          # Configure a static IP address and a default gateway on eth0
          # See https://wiki.alpinelinux.org/wiki/Configure_Networking#Interface_configuration
          cat <<EOF > /etc/network/interfaces
          auto lo
          iface lo inet loopback

          auto eth0
          iface eth0 inet static
              address $IP_ADDRESS
              netmask $NETMASK
              gateway $DEFAULT_GATEWAY
          EOF
          rc-service networking restart

          # Configure the DNS server
          # See https://wiki.alpinelinux.org/wiki/Alpine_configuration_management_scripts#setup-dns
          setup-dns $DNS_SERVER

          # Configure SSH config with matching key exchange method and host key type
          grep -q "KexAlgorithms" /etc/ssh/ssh_config ||
          cat <<EOF >> /etc/ssh/ssh_config
          KexAlgorithms +diffie-hellman-group-exchange-sha1,diffie-hellman-group14-sha1
          HostkeyAlgorithms +ssh-rsa
          EOF

          # Create a script to start a listener on a specific port
          cat <<'EOF' > /usr/local/bin/start_listener
          #!/bin/sh
          [ "$#" -ne 1 ] && { echo "usage: $0 {port}" >&2; exit 1; }
          [ -n "$1" ] && [ "$1" -eq "$1" ] 2>/dev/null || { echo "$0: invalid port" >&2; exit 1; }
          while : ; do
              echo "Welcome to port $1!" | nc -l -p "$1" -k || exit 1
          done
          EOF
          chmod +x /usr/local/bin/start_listener
          chown root:root /usr/local/bin/start_listener
          chmod 755 /usr/local/bin/start_listener

          # Simulate services

          # Simulate an internal HTTP service
          /usr/local/bin/start_listener 80 &
          # Simulate an internal HTTPS service
          /usr/local/bin/start_listener 443 &
          # Simulate an external HTTP service (accessible via port 80 from outside)
          /usr/local/bin/start_listener 8080 &
          # Simulate an external HTTPS service (accessible via port 443 from outside)
          /usr/local/bin/start_listener 8088 &

lab:
  description: |-
    This lab configures a Cisco ASA firewall and implements a site-to-site IPsec VPN in a network with headquarters, branch office, DMZ, guest network, and outside network (Internet).

    The lab topology was inspired from the online course Introduction to Network Simulations with Cisco Modeling Labs by Cisco U. (https://u.cisco.com/paths/introduction-network-simulations-with-cisco-modeling-labs-243).

    The Cisco ASA firewall defines various access rules for different zones (see `show access-list` and `show access-group`) and defines NAT translations (see `show nat` or `show run nat`). Furthermore, the firewall and R1-BR (the branch edge router) implement a site-to-site (IPsec) VPN for traffic between the branch office and the firewall (including traffic not destined to the firewall), which goes through R1-INET (an Internet router).

    For more information about the implemented features, see the configuration of the devices (`show running-config` or `show run`).

    Credentials:
    WALL-E: username: wall-e, password: eve
    WALL-E (FW): username: wall-e, password: eve_wall-e
    EVE: username: eve, password: wall-e
    EVE (FW): username: eve, password: wall-e_eve
    M-O: username: m-o, password: all_clean
    WALL-A: username: wall-a, password: axiom
    Server: username: cisco, password: cisco
    Admin: username: cisco, password: cisco
    Admin (FW): username: cisco, password: ciscoasa
    Enable secret: cisco
    Enable secret (FW): ciscoasa
  notes: ''
  title: Firewall_IPsec_Lab
  version: 0.3.0

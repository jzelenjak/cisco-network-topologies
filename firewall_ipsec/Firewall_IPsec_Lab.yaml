nodes:
  - boot_disk_size: null
    configuration:
      - name: ios_config.txt
        content: |-
          Building configuration...

          Current configuration : 5055 bytes
          !
          ! Last configuration change at 20:32:16 UTC Sun Mar 22 2026 by cisco
          !
          version 15.9
          service timestamps debug datetime msec
          service timestamps log datetime msec
          no service password-encryption
          !
          hostname R1-BR
          !
          boot-start-marker
          boot-end-marker
          !
          !
          no logging console
          enable secret 8 $8$JgGjfFerUwoXXP$aBeUZM0tiN6OZz20BpGNDYQx44k6QUWbtARfehxjl4Q
          !
          no aaa new-model
          !
          !
          !
          mmi polling-interval 60
          no mmi auto-configure
          no mmi pvc
          mmi snmp-timeout 180
          !
          !
          !
          !
          !
          !
          !
          !
          !
          !
          !
          no ip domain lookup
          ip domain name axiom.bnl
          ip host ASA 10.1.1.1
          ip cef
          no ipv6 cef
          !
          multilink bundle-name authenticated
          !
          !
          !
          !
          username cisco privilege 15 secret 8 $8$atE75V2ivLc0Dv$kJ.GWGaZqTOzLkX9AA.hcJ/EAjnwsOc6fsi6yeLE3rc
          username wall-e secret 8 $8$56Hf6CGl7tEz2v$8nyG2KMA1Pfyd7pnY5t8dkVud8A0FSsTjHS6f0ONY9E
          username wall-a secret 8 $8$iyWRnvdgaWT9RP$48iMleG9VIjLJKLi/wYfamkNWCAfGCkXAE/89ZZLZAk
          !
          redundancy
          !
          !
          !
          !
          crypto ikev2 proposal AEAD_Proposal
           encryption aes-gcm-256
           prf sha512
           group 21 20 16
          crypto ikev2 proposal Non_AEAD_Proposal
           encryption aes-cbc-256
           integrity sha512 sha384
           group 21 20 16
          !
          crypto ikev2 policy AEAD_Policy
           match address local 10.1.2.1
           proposal AEAD_Proposal
          crypto ikev2 policy Non_AEAD_Policy
           match address local 10.1.2.1
           proposal Non_AEAD_Proposal
          !
          crypto ikev2 keyring IKEv2_Keyring_PSK
           peer ASA
            description R1-to-ASA
            address 10.1.1.1
            pre-shared-key cisco
           !
          !
          !
          crypto ikev2 profile IKEv2_Profile
           description IKEv2 profile for VPN tunnel towards ASA
           match address local 10.1.2.1
           match identity remote address 10.1.1.1 255.255.255.255
           authentication remote pre-share
           authentication local pre-share
           keyring local IKEv2_Keyring_PSK
           lifetime 14400
          !
          !
          !
          crypto ipsec transform-set AEAD_Transform_Set esp-gcm 256
           mode tunnel
          crypto ipsec transform-set Non_AEAD_Transform_Set esp-aes 256 esp-sha512-hmac
           mode tunnel
          !
          !
          !
          !
          !
          crypto map VPN_Tunnel_Map 10 ipsec-isakmp
           description Crypto map for VPN tunnel towards ASA
           set peer 10.1.1.1
           set security-association lifetime seconds 7200
           set transform-set AEAD_Transform_Set Non_AEAD_Transform_Set
           set pfs group21
           set ikev2-profile IKEv2_Profile
           match address VPN_Traffic
          !
          !
          !
          !
          !
          interface GigabitEthernet0/0
           ip address 172.16.1.1 255.255.255.0
           duplex auto
           speed auto
           media-type rj45
          !
          interface GigabitEthernet0/1
           ip address 10.1.2.1 255.255.255.0
           duplex auto
           speed auto
           media-type rj45
           crypto map VPN_Tunnel_Map
          !
          interface GigabitEthernet0/2
           no ip address
           shutdown
           duplex auto
           speed auto
           media-type rj45
          !
          interface GigabitEthernet0/3
           no ip address
           shutdown
           duplex auto
           speed auto
           media-type rj45
          !
          ip forward-protocol nd
          !
          !
          no ip http server
          no ip http secure-server
          ip route 0.0.0.0 0.0.0.0 GigabitEthernet0/1 10.1.2.2
          ip ssh version 2
          !
          ip access-list extended VPN_Traffic
           permit ip 172.16.1.0 0.0.0.255 any
           remark Crypto ACL to match VPN traffic
          !
          ipv6 ioam timestamp
